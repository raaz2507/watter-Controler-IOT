<script>
	
	function createChart(){

			 datasets: [
				{	
					label: "tank1", 
					data: [10, 20, 30, 40 , 50, 40, 10, 20, 50, 70, 100, 5, 10, 20, 30, 40 , 50, 40, 10, 20, 50, 70, 100, 5],

			 	},
				{

//by class
class SVGChart{
	#Chartcontainer = null;
	static #dateObj = new Date();

	#padding = { top: 20, right: 10, bottom: 40, left: 40 };
	#valueMargin = {xRight: 20, yTop: 20};
	#svgDimention = {svgWidth : 350, svgHeight : 200, drawWidth:null, drawHeight:null};

	#ChartStruct =null;
	#svg = null;

	#min=null;
	#max=null;

	static get svgNS(){ return "http://www.w3.org/2000/svg";}


	constructor(container , Chartstruct){
		this.#init(container , Chartstruct);
	}

	#configContainer(container){
		if (typeof container === "string"){
			return  document.querySelector(container); 
		}else if(container instanceof HTMLElement){
			return  container;
		}else{
			throw new Error("Container not found 😤");
			// return null;
		}
		
	}
	#init(container , ChartStruct){
		this.#Chartcontainer = this.#configContainer(container);
		this.#ChartStruct = ChartStruct;
		
		this.#computeDataRange();
		this.#calculateDrawableArea();
		this.#draw();
		
		
	}
	#calculateDrawableArea(){
		// Padding Settings
		this.#svgDimention.drawWidth = this.#svgDimention.svgWidth - this.#padding.left - this.#padding.right; // 300
		this.#svgDimention.drawHeight = this.#svgDimention.svgHeight - this.#padding.top - this.#padding.bottom; // 150
	}
	#computeDataRange(){
		const allData = this.#ChartStruct.datasets.flatMap(d => d.data);

		this.#max = Math.max(...allData);
		this.#min = Math.min(...allData);
	}
	
	
	
	#draw(){
;		this.#svg = this.#createSVG({
			viewBox:{minX :0, minY:0, width :this.#svgDimention.svgWidth, height: this.#svgDimention.svgHeight},
			widht : '100%', height: '100%', preserveAspectRatio : 'none',
		});

		this.#svg.innerHTML = `
			<defs>
				${this.#animationEffet()}
			</defs>
			<!-- Chart Title -->
			<!--<text x="175" y="15" transform="rotate(0)" text-anchor="middle" fill="#333" font-family="Arial" font-size="10" font-weight="bold" letter-spacing="1">${this.#ChartStruct.chart.label}</text>--> 
			
			<!-- vertical line (y-axis)-->
			<!--<text id="yTitle" x="-100" y="18" transform="rotate(-90)" text-anchor="middle" fill="#333" font-family="Arial" font-size="10" font-weight="bold" letter-spacing="1">Water Lavel</text>-->
			
			<line x1="${this.#padding.left}" y1="${this.#padding.top}" 
				x2="${this.#padding.left}" y2="${this.#padding.top + this.#svgDimention.drawHeight}" 
				stroke="#ccc" stroke-width="2" />
			<!--<g id="yAxisValues" font-family="Arial" font-size="10" fill="#666" text-anchor="end"></g>-->

			<!-- horizontal Line (x-axis) -->
				<!--<text id="xTitle" x="175" y="195" transform="rotate(0)" text-anchor="middle" fill="#333" font-family="Arial" font-size="10" font-weight="bold" letter-spacing="1">Time</text>-->
				<line id="xAxisLine"
					x1="${this.#padding.left}" y1="${this.#padding.top + this.#svgDimention.drawHeight}" 
					x2="${this.#padding.left + this.#svgDimention.drawWidth}" y2="${this.#padding.top + this.#svgDimention.drawHeight}" 
					stroke="#ccc" stroke-width="2" /> 
				<!--<g id="xAxisValues"  font-family="Arial" font-size="10" fill="#666" text-anchor="end"></g>-->
			`;

		this.#drawXAxisLabels(); // labels
		this.#drawYAxisLabels(); // y numbers
		
		this.#drawXAxisTitle();
		this.#drawYAxisTitle();
		
		this.#chartTitle();
		this.#drawChartDataLine();   // lines + area

		this.#Chartcontainer.append(this.#svg);
	}

	#drawChartDataLine__(){
		this.#ChartStruct.datasets.forEach((dataset) => {

			const points = dataset.data.map((val, i) => {

				const x = this.#padding.left + 
					(i * (this.#svgDimention.drawWidth / (dataset.data.length - 1)));

				const y = this.#padding.top + this.#svgDimention.drawHeight -
					((val - this.#min) / (this.#max - this.#min)) * this.#svgDimention.drawHeight;

				return { x, y };
			});

			const pathData = points.map((p, i) => 
				`${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`
			).join(" ");

			const path = document.createElementNS("http://www.w3.org/2000/svg", "path");

			path.setAttribute("d", pathData);
			path.setAttribute("fill", "none");
			path.setAttribute("stroke", dataset.color || "blue");
			path.setAttribute("stroke-width", "2");

			
		
			const first = points[0];
			const last = points[points.length - 1];

			const areaPath = `
				${pathData}
				L ${last.x} ${this.#padding.top + this.#svgDimention.drawHeight}
				L ${first.x} ${this.#padding.top + this.#svgDimention.drawHeight}
				Z
			`;

			const area = document.createElementNS("http://www.w3.org/2000/svg", "path");

			area.setAttribute("d", areaPath);
			area.setAttribute("fill", "url(#areaGradient)");

			this.#svg.appendChild(area);
			this.#svg.appendChild(path);
		});
	}

	#drawChartDataLine_(){
		this.#ChartStruct.datasets.forEach((dataset)=>{

			// 2. Convert Data to X,Y Points object (Label के साथ)
			const points = dataset.map((value, index) => {
				// वही लॉजिक जो आपने X-axis लेबल्स के लिए इस्तेमाल किया था
				let hour = (SVGChart.#dateObj.getHours() - (24 - index) + 24) % 24;
				let timeLabel = "";
				if (hour === 0) timeLabel = "12 am";
				else if (hour < 12) timeLabel = hour.toString().padStart(2, '0') + " am";
				else if (hour === 12) timeLabel = "12 pm";
				else timeLabel = (hour - 12).toString().padStart(2, '0') + " pm";

				return {
					x: padding.left + (index / (data.length - 1)) * drawWidth,
					y: svgHeight - padding.bottom - (value / maxData) * drawHeight,
					val: value,
					time: timeLabel // टूलटिप के लिए टाइम सेव किया
				};
			});

			// 3. Smooth Curve Generator Function
			function createSmoothPath(points) {
				let d = `M ${points[0].x},${points[0].y} `;
				for (let i = 0; i < points.length - 1; i++) {
					const p0 = points[i === 0 ? 0 : i - 1];
					const p1 = points[i];
					const p2 = points[i + 1];
					const p3 = points[i + 2 === points.length ? i + 1 : i + 2];
					const tension = 0.2; 
					const cp1x = p1.x + (p2.x - p0.x) * tension;
					const cp1y = p1.y + (p2.y - p0.y) * tension;
					const cp2x = p2.x - (p3.x - p1.x) * tension;
					const cp2y = p2.y - (p3.y - p1.y) * tension;
					d += `C ${cp1x},${cp1y} ${cp2x},${cp2y} ${p2.x},${p2.y} `;
				}
				return d;
			}

			const smoothPathString = createSmoothPath(points);

			// Line set karna
			const linePath = document.getElementById("lineChart");
			linePath.setAttribute("d", smoothPathString);

			// Area set karna
			const areaPathString = `${smoothPathString} L ${padding.left + drawWidth},${svgHeight - padding.bottom} L ${padding.left},${svgHeight - padding.bottom} Z`;
			document.getElementById("areaChart").setAttribute("d", areaPathString);

			// Line Drawing Animation setup
			const pathLength = linePath.getTotalLength();
			linePath.style.strokeDasharray = pathLength;
			linePath.style.strokeDashoffset = pathLength;
			linePath.getBoundingClientRect(); 
			// linePath.style.transition = 'stroke-dashoffset 2s ease-in-out';
			linePath.style.transition = 'stroke-dashoffset 2s cubic-bezier(0.4, 0, 0.2, 1)';
			linePath.style.strokeDashoffset = '0';

			// Tooltip elements
			const tooltipGroup = document.getElementById("tooltipGroup");
			const tooltipBg = document.getElementById("tooltipBg");
			const tooltipText = document.getElementById("tooltipText");
			const chartSVG = document.getElementById("chart");


			// 4. data graph line par Circles draw karna aur Tooltip Event lagana
			points.forEach((point, index) => {
				const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
				// ... (बाकी एट्रिब्यूट्स वही रहेंगे)
				circle.setAttribute("cx", point.x);
				circle.setAttribute("cy", point.y);
				circle.setAttribute("r", 1.5); 
				circle.setAttribute("fill", "#41ffff8e");
				circle.setAttribute("stroke", "rgb(255, 255, 255)");
				circle.setAttribute("stroke-width", "1");
				circle.style.animationDelay = `${(index / points.length) * 2}s`;

				// Tooltip Hover Logic
				circle.addEventListener("mouseenter", () => {
					tooltipGroup.style.display = "block";
					
					// टूलटिप में वैल्यू और टाइम दोनों दिखाएं
					tooltipText.innerHTML = `<tspan x="${point.x}" dy="1.2em" font-weight="bold">${point.val}%</tspan>
											<tspan x="${point.x}" dy="1.2em" font-size="8">${point.time}</tspan>`;
					
					const tipX = point.x - 25; // बॉक्स थोडा चौड़ा किया है
					const tipY = point.y - 45; // बॉक्स थोडा ऊपर किया है

					if (tipX < 0) tipX = 0;
					if (tipX > svgWidth - 50) tipX = svgWidth - 50;
					if (tipY < 0) tipY = 10;
					
					// टूलटिप बॉक्स (Background) की सेटिंग्स 🔥
					tooltipBg.setAttribute("x", tipX+4);
					tooltipBg.setAttribute("y", tipY+7);
					tooltipBg.setAttribute("width", "40");
					tooltipBg.setAttribute("height", "25");
					tooltipBg.setAttribute("rx", "1");          // Border Radius
					tooltipBg.setAttribute("fill-opacity", "0.8"); // Transparency (0.1 से 1 तक)
					tooltipBg.setAttribute("fill", "#333");      // डार्क बैकग्राउंड ज्यादा अच्छा लगता है
					
					tooltipText.setAttribute("x", point.x);
					tooltipText.setAttribute("y", tipY + 5);
					tooltipText.setAttribute("fill", "white");   // टेक्स्ट वाइट

					chartSVG.appendChild(tooltipGroup);
				});

				circle.addEventListener("mouseleave", () => {
					tooltipGroup.style.display = "none";
				});
				chartSVG.appendChild(circle);
			});


		});
		// Append tooltip group properly at the end so it's always on top
		chartSVG.appendChild(tooltipGroup);
		document.getElementById("areaChart").setAttribute("fill", "url(#areaGradient)");

	}
	#animationEffet(){
		return `<linearGradient id="areaGradient" x1="0" y1="0" x2="0" y2="1">
					<stop offset="0%" stop-color="#0BB5FF" stop-opacity="0.9"/>
					<stop offset="100%" stop-color="#0BB5FF" stop-opacity=".3"/>
				</linearGradient>`;
	}

	//fixed
	#drawXAxisTitle(){

		/*
		<!-- xAxis Title --> 
		<text id="xTitle" x="175" y="195" transform="rotate(0)" text-anchor="middle" fill="#333" 
		font-family="Arial" font-size="10" font-weight="bold" letter-spacing="1">Time</text>
		*/

		const xTitle = this.#createTextElemet({
			id: 'xTitle',
			x: this.#padding.left + this.#svgDimention.drawWidth / 2,
			y: this.#svgDimention.svgHeight - 5,
			text_anchor: 'middle',
			fill: '#333',
			font_family : 'Arial',
			font_size : 10,
			font_weight : 'bold',
			letter_spacing : 1,
			textContent : this.#ChartStruct.Xaxis.title,
		});
		
		//console.log(xTitle);
		this.#svg.appendChild(xTitle);
	}

	#drawXAxisLabels(){ 
		// <g id="xAxisValues"  font-family="Arial" font-size="10" fill="#666" text-anchor="end"></g>

		const xAxisLabelGroup = this.#createGroupElement({
			id: 'xAxisValues',
			font_family : 'Arial',
			font_size: 10,
			fill: '#666',
			text_anchor: 'end'
		});
		const labels = this.#ChartStruct.labels;

		//console.log(labels.length);
		
		labels.forEach( (label, i)=> {
			const xPos = this.#padding.left + (i / (labels.length-1)) * (this.#svgDimention.drawWidth - this.#padding.right);
			// --- 1. Text Label Create करना ---
			const textEl = this.#createTextElemet({
				x: xPos,
				y: this.#svgDimention.svgHeight - 17,
				text_anchor: 'start',
				font_size: 8, 
				rotate : {angle: -45, cx: xPos- this.#padding.right, cy: this.#svgDimention.svgHeight}, // 🔥 45° tilt
				textContent: label,
			}); 
			xAxisLabelGroup.appendChild(textEl);

			// --- 2. X-axis पर Dot (Circle) Create करना 🔥 ---
			const dotEl = this.#createCircle({
				cx: xPos, // X पोजीशन (वही जो टेक्स्ट की है)
				cy: 160,	// Y पोजीशन (आपकी X-axis लाइन 160 पर है)
				radius: 2.5, // डॉट का साइज़ (Radius)
				fill: '#666',
			});
			
			xAxisLabelGroup.appendChild(dotEl); // डॉट को भी उसी ग्रुप में जोड़ दें
		});

		this.#svg.append(xAxisLabelGroup);
	}
	//fixed
	#drawYAxisTitle(){
		const yTitle = this.#createTextElemet({
			x: - (this.#svgDimention.svgHeight / 2), y: 18,
			textContent: this.#ChartStruct.Yaxis.title,
			rotate: {angle: -90},
			text_anchor: 'middle', fill : '#333',
			font_family : 'Arial', font_size: 10, font_weight : 'bold', letter_spacing: 1,
			id : "yTitle",
		});

		this.#svg.appendChild(yTitle);
	}

	#drawYAxisLine(){
		console.log('write: drawYAxisLine');
	}

	//fixed
	#drawYAxisLabels(steps =5){
		const stepValue = this.#max  / steps;

		// 1. Draw Y-Axis Values (0, 25, 50, 75, 100)
		//document.getElementById("yAxisValues");
		const yAxisGroup = this.#createGroupElement({ font_family : 'Arial', font_size : 10, fill : '#666', text_anchor :'end', id : "YAxisLabels"});

		
		for (let val = 0; val <= this.#max; val += stepValue) {
			const yPos = this.#svgDimention.svgHeight - this.#padding.bottom - (val / this.#max) * (this.#svgDimention.drawHeight -this.#valueMargin.yTop);

			// 🟡 GRID LINE ADD करो यहाँ
			const gridLine = this.#createLine({
				x1 : this.#padding.left,
				x2 : this.#svgDimention.svgWidth - this.#padding.right,
				y1 : yPos,
				y2 : yPos,
				strock : '#eee',
				stroke_width :1,
			});
			yAxisGroup.appendChild(gridLine);
			
			// 📝 TEXT LABEL
			const textEl = this.#createTextElemet({
				x: this.#padding.left - 5, // Line se thoda pehle
				y: yPos + 3, // Center align karne ke liye +3
				textContent: val, font_size: 10
			});

			yAxisGroup.appendChild(textEl);

			// 2. Create 🟡 Dot Mark on y-axis ---
			const dotEls = this.#createCircle({
				cx: 40, 
				cy: yPos,		// Y position (defult X-axis line on 160 )
				radius : 2.5,	// dot's size (Radius)
				fill: "#666" // color of dot or "#333"
			});

			yAxisGroup.appendChild(dotEls);
		}
		this.#svg.append(yAxisGroup);
	}

	//fixed
	#chartTitle(){
		/*
		<!-- Chart Title -->
		<text x="175" y="15" transform="rotate(0)" text-anchor="middle" fill="#333"

	// Helping methods
	//fixed
	#createSVG({viewBox={minX : 0, minY:0,  width:350,  height: 200}, width= '100%', height = '100%', preserveAspectRatio = 'none'}={}){
		const svgElemnt  =  document.createElementNS(SVGChart.svgNS, "svg");
		if (viewBox){
			const {minX, minY, width, height} = viewBox;
			svgElemnt.setAttribute('viewBox', `${minX} ${minY} ${width} ${height}`);
		}
		
		svgElemnt.setAttribute('width', width);   // responsive
		svgElemnt.setAttribute('height', height);
		svgElemnt.setAttribute('preserveAspectRatio', preserveAspectRatio);

		return svgElemnt;
	}

	#createTextElemet( {x = 0, y = 0, textContent = "", 
						font_size = 12, fill = "#555", font_weight = 400, letter_spacing = 0.5 , font_family="Arial, sans-serif", 
						text_anchor = "left", rotate = null , id=''}){
		const textElemt = document.createElementNS(SVGChart.svgNS, 'text');

		textElemt.setAttribute("x", x);
		textElemt.setAttribute("y", y);
		textElemt.setAttribute("text-anchor", text_anchor);
		
		textElemt.setAttribute('fill', fill);

		textElemt.setAttribute('font-size', font_size);
		textElemt.setAttribute('font-weight', font_weight);
		textElemt.setAttribute('letter-spacing', letter_spacing);
		textElemt.setAttribute('font-family', font_family);
		
		textElemt.setAttribute("id", id );
		
		if (rotate){
			//Syntex: rotate(angle, cx, cy)
			const {angle =0, cx=0, cy=0} =rotate;
			textElemt.setAttribute("transform", `rotate(${angle}, ${cx}, ${cy})`);
		}

		textElemt.textContent = textContent;
		return textElemt;
	}

	#createLine({x1= 0, x2 =0, y1=10, y2=10, strock = "#eee", stroke_width = 1}){
		const lineElemt =  document.createElementNS(SVGChart.svgNS, 'line');
		
		lineElemt.setAttribute("x1", x1);
		lineElemt.setAttribute("x2", x2);
		lineElemt.setAttribute("y1", y1);
		lineElemt.setAttribute("y2", y2);
		lineElemt.setAttribute("stroke", strock);
		lineElemt.setAttribute("stroke-width", stroke_width);
		
		return lineElemt;
	}

	#createCircle({ cx= 0, cy=0, radius=1, fill= "#333"}){
		const dotElemnt = document.createElementNS(SVGChart.svgNS, 'circle');
		dotElemnt.setAttribute('cx', cx);
		dotElemnt.setAttribute('cy', cy);
		dotElemnt.setAttribute('r', radius);
		dotElemnt.setAttribute('fill', fill);
		// dotElemnt.setAttribute();

		return dotElemnt;
	}

	#createGroupElement({font_family = 'Arial', font_size = 12, fill = '#666', text_anchor = 'left', id = ''}){
		const groupElemet = document.createElementNS(SVGChart.svgNS, 'g');
		
		groupElemet.setAttribute('font-family', font_family);
		groupElemet.setAttribute('font-size', font_size);
		groupElemet.setAttribute('fill', fill);
		groupElemet.setAttribute('text-anchor', text_anchor);
		groupElemet.setAttribute('id', id);
		
		return groupElemet;
	}


	#drawChartDataLine() {
    // 1. Tooltip Elements ko dynamic banayein (sirf ek baar)
    const tooltipGroup = document.createElementNS(SVGChart.svgNS, "g");
    tooltipGroup.style.display = "none";
    
    const tooltipBg = document.createElementNS(SVGChart.svgNS, "rect");
    const tooltipText = document.createElementNS(SVGChart.svgNS, "text");
    
    tooltipGroup.appendChild(tooltipBg);
    tooltipGroup.appendChild(tooltipText);

    // 2. Har dataset (Tank 1, Tank 2) ke liye loop chalayein
    this.#ChartStruct.datasets.forEach((dataset, datasetIndex) => {

        // 3. Convert Data to X,Y Points (dataset.data.map use karna zaroori hai)
        const points = dataset.data.map((value, index) => {
            let hour = (SVGChart.#dateObj.getHours() - (24 - index) + 24) % 24;
            let timeLabel = "";
            if (hour === 0) timeLabel = "12 am";
            else if (hour < 12) timeLabel = hour.toString().padStart(2, '0') + " am";
            else if (hour === 12) timeLabel = "12 pm";
            else timeLabel = (hour - 12).toString().padStart(2, '0') + " pm";

            // this.# class variables ka sahi use:
            return {
                x: this.#padding.left + (index / (dataset.data.length - 1)) * this.#svgDimention.drawWidth,
                y: this.#svgDimention.svgHeight - this.#padding.bottom - (value / this.#max) * this.#svgDimention.drawHeight,
                val: value,
                time: timeLabel
            };
        });

        // 4. Smooth Curve Generator Function
        const createSmoothPath = (pointsArray) => {
            let d = `M ${pointsArray[0].x},${pointsArray[0].y} `;
            for (let i = 0; i < pointsArray.length - 1; i++) {
                const p0 = pointsArray[i === 0 ? 0 : i - 1];
                const p1 = pointsArray[i];
                const p2 = pointsArray[i + 1];
                const p3 = pointsArray[i + 2 === pointsArray.length ? i + 1 : i + 2];
                const tension = 0.2; 
                const cp1x = p1.x + (p2.x - p0.x) * tension;
                const cp1y = p1.y + (p2.y - p0.y) * tension;
                const cp2x = p2.x - (p3.x - p1.x) * tension;
                const cp2y = p2.y - (p3.y - p1.y) * tension;
                d += `C ${cp1x},${cp1y} ${cp2x},${cp2y} ${p2.x},${p2.y} `;
            }
            return d;
        };

        const smoothPathString = createSmoothPath(points);

        // 5. NAYA AREA PATH CREATE KAREIN
        const areaPath = document.createElementNS(SVGChart.svgNS, "path");
        const areaPathString = `${smoothPathString} L ${this.#padding.left + this.#svgDimention.drawWidth},${this.#svgDimention.svgHeight - this.#padding.bottom} L ${this.#padding.left},${this.#svgDimention.svgHeight - this.#padding.bottom} Z`;
        areaPath.setAttribute("d", areaPathString);
        areaPath.setAttribute("fill", dataset.color); 
        areaPath.setAttribute("opacity", "0.2"); // Transparency for area
        this.#svg.appendChild(areaPath);

        // 6. NAYA LINE PATH CREATE KAREIN
        const linePath = document.createElementNS(SVGChart.svgNS, "path");
        linePath.setAttribute("d", smoothPathString);
        linePath.setAttribute("fill", "none");
        linePath.setAttribute("stroke", dataset.color); // Dataset ka color
        linePath.setAttribute("stroke-width", "2");
        this.#svg.appendChild(linePath);

        // 7. LINE ANIMATION
        const pathLength = linePath.getTotalLength();
        linePath.style.strokeDasharray = pathLength;
        linePath.style.strokeDashoffset = pathLength;
        linePath.getBoundingClientRect(); // Trigger layout
        linePath.style.transition = 'stroke-dashoffset 2s cubic-bezier(0.4, 0, 0.2, 1)';
        linePath.style.strokeDashoffset = '0';

        // 8. DOTS AUR TOOLTIP LOGIC
        points.forEach((point, index) => {
            const circle = document.createElementNS(SVGChart.svgNS, "circle");
            circle.setAttribute("cx", point.x);
            circle.setAttribute("cy", point.y);
            circle.setAttribute("r", 2); 
            circle.setAttribute("fill", dataset.color);
            circle.setAttribute("stroke", "#fff");
            circle.setAttribute("stroke-width", "1");
            circle.style.animationDelay = `${(index / points.length) * 2}s`;

            // Hover Events
            circle.addEventListener("mouseenter", () => {
                tooltipGroup.style.display = "block";
                
                tooltipText.innerHTML = `<tspan x="${point.x}" dy="1.2em" font-weight="bold">${dataset.label}: ${point.val}%</tspan>
                                         <tspan x="${point.x}" dy="1.2em" font-size="8">${point.time}</tspan>`;
                
                let tipX = point.x - 25; 
                let tipY = point.y - 45; 

                if (tipX < 0) tipX = 0;
                if (tipX > this.#svgDimention.svgWidth - 50) tipX = this.#svgDimention.svgWidth - 50;
                if (tipY < 0) tipY = 10;
                
                tooltipBg.setAttribute("x", tipX + 4);
                tooltipBg.setAttribute("y", tipY + 7);
                tooltipBg.setAttribute("width", "60"); // thoda bada kiya label ke liye
                tooltipBg.setAttribute("height", "25");
                tooltipBg.setAttribute("rx", "2");
                tooltipBg.setAttribute("fill", "#333");
                tooltipBg.setAttribute("fill-opacity", "0.9");
                
                tooltipText.setAttribute("x", point.x);
                tooltipText.setAttribute("y", tipY + 5);
                tooltipText.setAttribute("fill", "white");
                tooltipText.setAttribute("font-family", "Arial");
                tooltipText.setAttribute("font-size", "10");
                tooltipText.setAttribute("text-anchor", "middle");

                // Tooltip ko hamesha upar rakhne ke liye SVG ke aakhir mein daalein
                this.#svg.appendChild(tooltipGroup);
            });

            circle.addEventListener("mouseleave", () => {
                tooltipGroup.style.display = "none";
            });

            this.#svg.appendChild(circle);
        });
    });
}
}

function Lablesfor24Hours(){
		const lables= [];
		const now = new Date();
		for (let i = 0; i < 24; i++) {
			// 🕒 Current time based shift
			
			let hour = (now.getHours() - (24 - i) + 24) % 24;
			let label = "";

			if (hour === 0) label = "12 am";
			else if (hour < 12) label = hour.toString().padStart(2, '0') + " am";
			else if (hour === 12) label = "12 pm";
			else label = (hour - 12).toString().padStart(2, '0') + " pm";
			
			lables.push(label);
		}
		
		return lables;
	}
