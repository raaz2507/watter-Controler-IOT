function Lablesfor24Hours(){
	const lables= [];
	const now = new Date();
	for (let i = 0; i < 24; i++) {
		// 🕒 Current time based shift
		
		let hour = (now.getHours() - (24 - i) + 24) % 24;
		let label = "";

		if (hour === 0) label = "12 am";
		else if (hour < 12) label = hour.toString().padStart(2, '0') + " am";
		else if (hour === 12) label = "12 pm";
		else label = (hour - 12).toString().padStart(2, '0') + " pm";
		
		lables.push(label);
	}
	
	return lables;
}

//Core Class
class CoreSVGChart{
	static dateObj = new Date();
	
	static get svgNS(){ return "http://www.w3.org/2000/svg";}
	
	chartDataLineColors =['#98F5FF', '#FF6B6B', "#4ecdc4", "#ffe66d", "#1a535c"];

	constructor(){

	}
	init() {
		console.log("Common setup");
		// svg create, axis draw, etc
	}

	draw() {
		throw new Error("draw() must be implemented");
	}

	createSVGElement({viewBox={minX : 0, minY:0,  width:350,  height: 200}, width= '100%', height = '100%', preserveAspectRatio = 'none'}={}){
		const svgElemnt  =  document.createElementNS(CoreSVGChart.svgNS, "svg");
		if (viewBox){
			const {minX, minY, width, height} = viewBox;
			svgElemnt.setAttribute('viewBox', `${minX} ${minY} ${width} ${height}`);
		}
		
		svgElemnt.setAttribute('width', width);   // responsive
		svgElemnt.setAttribute('height', height);
		svgElemnt.setAttribute('preserveAspectRatio', preserveAspectRatio);

		return svgElemnt;
	}

	createTextElement( {x = 0, y = 0, textContent = "", 
						font_size = 12, fill = "#555", font_weight = 400, letter_spacing = 0.5 , font_family="Arial, sans-serif", 
						text_anchor = "start", rotate = null , id=''}){
		const textElemt = document.createElementNS(CoreSVGChart.svgNS, 'text');

		textElemt.setAttribute("x", x);
		textElemt.setAttribute("y", y);
		textElemt.setAttribute("text-anchor", text_anchor);
		
		textElemt.setAttribute('fill', fill);

		textElemt.setAttribute('font-size', font_size);
		textElemt.setAttribute('font-weight', font_weight);
		textElemt.setAttribute('letter-spacing', letter_spacing);
		textElemt.setAttribute('font-family', font_family);
		
		textElemt.setAttribute("id", id );
		
		if (rotate){
			//Syntex: rotate(angle, cx, cy)
			const {angle =0, cx=0, cy=0} =rotate;
			textElemt.setAttribute("transform", `rotate(${angle}, ${cx}, ${cy})`);
		}

		textElemt.textContent = textContent;
		return textElemt;
	}

	createLineElement({x1= 0, x2 =0, y1=10, y2=10, stroke = "#eee", stroke_width = 1}){
		const lineElemt =  document.createElementNS(CoreSVGChart.svgNS, 'line');
		
		lineElemt.setAttribute("x1", x1);
		lineElemt.setAttribute("x2", x2);
		lineElemt.setAttribute("y1", y1);
		lineElemt.setAttribute("y2", y2);
		lineElemt.setAttribute("stroke", stroke);
		lineElemt.setAttribute("stroke-width", stroke_width);
		
		return lineElemt;
	}

	createRectElement({id= '', width=0, height=0, fill_color='', rx=0, fill_opacity=1, stroke=0 }){
		const rectElement = document.createElementNS(CoreSVGChart.svgNS, 'rect');
		rectElement.setAttribute('id', id);
		rectElement.setAttribute('width', width);
		rectElement.setAttribute('height', height);
		rectElement.setAttribute('fill', fill_color);
		rectElement.setAttribute('rx', rx);
		rectElement.setAttribute('stroke', stroke);
		rectElement.setAttribute("fill-opacity", fill_opacity); // Transparency (0.1 to 1 )
		return rectElement;
	}

	createCircleElement({ cx= 0, cy=0, radius=1, fill= "#333", stroke_color = '#ccc', stroke_width= '0'}){
		const dotElemnt = document.createElementNS(CoreSVGChart.svgNS, 'circle');
		dotElemnt.setAttribute('cx', cx);
		dotElemnt.setAttribute('cy', cy);
		dotElemnt.setAttribute('r', radius);
		dotElemnt.setAttribute('fill', fill);
		
		dotElemnt.setAttribute('stroke-width', stroke_width);

		if(stroke_width>0){
			dotElemnt.setAttribute('stroke', stroke_color);
		}
		// dotElemnt.setAttribute();

		return dotElemnt;
	}

	createGroupElement({font_family = '', font_size = 12, fill = '#666', text_anchor = 'left', id = ''}={}){
		const groupElemet = document.createElementNS(CoreSVGChart.svgNS, 'g');
		
		groupElemet.setAttribute('font-family', font_family);
		groupElemet.setAttribute('font-size', font_size);
		groupElemet.setAttribute('fill', fill);
		groupElemet.setAttribute('text-anchor', text_anchor);
		groupElemet.setAttribute('id', id);
		
		return groupElemet;
	}
	createPathElement({id = '', fill = '#333', stroke= '#666', stroke_width = 1, d = ''}={}){
		const pathElement =  document.createElementNS(CoreSVGChart.svgNS, 'path');

		pathElement.setAttribute('fill', fill);
		pathElement.setAttribute('stroke', stroke);
		pathElement.setAttribute('stroke-width', stroke_width);

		pathElement.setAttribute('id', id);
		pathElement.setAttribute('d', d); //drawing instructions
		return pathElement;
	}
}

class LineChart extends CoreSVGChart{
	
	#chartStruct =null;
	#chartElements =
	{
		chartContainer: null, chartSVG: null, defs: null,
		chartTitle:null, chartDataLineLabel : null,
		xAxisLine: null, xAxisLables: null, xAxisTitle: null, 
		yAxisLine: null, yAxisLables: null, yAxisTitle: null,
		chartDataSetsElemnts : [ {
			chartDataLine: null, chartAreaFill: null, clipRect: null, chartDataPointCirclesGroup: null,  tooltips:{group : null, text : null ,background :null, arrow : null}, dataPointGroup : null
		}, ],
		dataCircleMasterGroup : null,
	};
	
	#padding = { top: 20, right: 10, bottom: 40, left: 40 };
	#valueMargin = {xRight: 10, yTop: 20};
	#svgDimention = {svgWidth : 350, svgHeight : 200, drawWidth:null, drawHeight:null};
	#DataRange ={min : undefined, max: undefined};

	#cssAnimationDuration = 2000;
	// #cssProperites = {dasharray: undefined};

	constructor(container, ChartStruct){
		super();
		this.#init(container, ChartStruct);
		
		this.#draw();
		// console.log(this.#chartElements);
		// console.log(this.#chartStruct.options.animation.dataLinePointAnimation);
	}

	#init(container , ChartStruct){
		this.#chartElements.chartContainer = this.#configContainer(container);
		this.#chartStruct =  this.#ChartStructConfig(ChartStruct);
		// console.log(this.#chartStruct);
		
		this.#computeDataRange();
		this.#calculateDrawableArea();
	}

	#configContainer(container){
		if (typeof container === "string"){
			return  document.querySelector(container); 
		}else if(container instanceof HTMLElement){
			return  container;
		}else{
			throw new Error("Container not found 😤");
			// return null;
		}
		
	}
	#computeDataRange(){
		const allData = this.#chartStruct.data.datasets.flatMap(d => d.data);

		this.#DataRange.max = Math.max(...allData);
		this.#DataRange.min = Math.min(...allData);
	}

	#calculateDrawableArea(){
		// Padding Settings
		this.#svgDimention.drawWidth = this.#svgDimention.svgWidth - this.#padding.left - this.#padding.right; // 300
		this.#svgDimention.drawHeight = this.#svgDimention.svgHeight - this.#padding.top - this.#padding.bottom; // 150
	}
	#ChartStructConfig(config){
		if (typeof config !== "object" || config === null) {
			config = {};
		}
		const {
			chart = {},
			xAxis = {},
			yAxis = {},
			data = {},
			options = {}
		} = config;
		
		const chartSchema = {
			chart: {
				type: "object",
				schema: {
					type: { type: "string", default: "line", validate: (v) => ["line", "bar"].includes(v)},
					title: { type: "string", default: "Chart Title" }
				}
			},
			
			xAxis: {
				type: "object",
				schema: {
					title: { type: "string", default: "X Axis" }
				}
			},
			yAxis: {
				type: "object",
				schema: {
					title: { type: "string", default: "Y Axis" }
				}
			},
			data: {
				type: "object",
				schema: {
					labels: { type: "array", default: [] },
					datasets: { type: "array", default: [] }
				}
			},
			options: {
				type: "object",
				schema: {
					animation: {
						type: "object",
						schema: {
							chartTitleAinmation: { type: "object", default: {type: "fade"} },
							xTitleAnimation: { type: "object", default: {type: "fade"} },
							xLineAnimation: { type: "object", default: {type: "slide"} },
							xLineLabel: { type: "object", default: {type: "fade"} },
							yTitleAnimation: { type: "object", default: {type: "fade"} },
							yLineAnimation: { type: "object", default: {type: "slide"} },
							yLineLabel: { type: "object", default: {type: "fade"} },
							dataLineAnimation: { type: "object", default: { type: "draw", duration: 2000 } },
							dataLinePointAnimation: {
														type: "object",
														schema: {
															type: { type: "string", default: "pop" },
															delay: { type: "string", default: "sync-line" },
															duration: { type: "number", default: 500 }
														}
													},
							toolTipsAnimation: { type: "object", default: {type: "fade"} }
						}
					}
				}
			},
		};

		function validate(schema, input = {}) {
			const output = {};

			for (const key in schema) {
				const rule = schema[key];
				const value = input[key];

				// अगर nested object है
				if (rule.type === "object") {
					output[key] = validate(rule.schema, value || {});
				}

				// string validation
				else if (rule.type === "string") {
					let valid = typeof value === "string" && value.trim() !== "";

					// custom validation
					if (rule.validate && !rule.validate(value)) {
						valid = false;
					}

					output[key] = valid ? value : rule.default;
				}

				// array validation
				else if (rule.type === "array") {
					output[key] = Array.isArray(value)
						? value
						: rule.default;
				}

				// fallback
				else {
					output[key] = value ?? rule.default;
				}
			}

			return output;
		}
		return validate(chartSchema, config);
	}

	#draw() {
		this.#chartElements.chartSVG = this.createSVGElement({
			viewBox:{minX :0, minY:0, width :this.#svgDimention.svgWidth, height: this.#svgDimention.svgHeight},
			width : '100%', height: '100%', preserveAspectRatio : 'none',
		});

		this.#chartElements.defs =  document.createElementNS(CoreSVGChart.svgNS, 'defs');
		this.#chartElements.chartSVG.append(this.#chartElements.defs);
		this.#chartTitle();
		this.#drawChartDataLineLabel(); //add lable of data line with color used in this 

		this.#drawYAxisLine();
		this.#drawXAxisLine();

		this.#drawYAxisLabels(); // y numbers
		this.#drawYAxisTitle();
		
		this.#drawXAxisLabels(); // labels
		this.#drawXAxisTitle();
		
		this.#drawChartDataLine();   // lines + area
		
		/* Aniamiton on Elements */ 
		//this.#addAnimationsInCSS(); //this will add animation code in CSS
		this.#addDataLineAnimation(); // Line Drawing Animation setup
		this.#addDataLineFillAnimation();
		this.#addDataPointCircleAnimation();
		// this.#addToolTipsAnimation(tooltipText, tooltipBg);

		this.#addBackGroundInSVG();
		this.#chartElements.chartContainer.append(this.#chartElements.chartSVG);

		this.#addEventOnDataPoint();
	}

	#addBackGroundInSVG(){
		//svg me backgrund
		const bgRect = document.createElementNS(CoreSVGChart.svgNS, 'rect');

		bgRect.setAttribute('x', 0);
		bgRect.setAttribute('y', 0);
		bgRect.setAttribute('width', '100%');
		bgRect.setAttribute('height', '100%');
		bgRect.setAttribute('fill', '#ffe7d9'); // light
		bgRect.setAttribute('fill', 'url(#bgGradient)');
		
		this.#chartElements.chartSVG.prepend(bgRect); // 👈 सबसे पहले add करो

		this.#chartElements.defs.append(bgGradiunt());

		function bgGradiunt(){
			const lineGradientElemt = document.createElementNS(CoreSVGChart.svgNS, 'linearGradient');
			lineGradientElemt.id = "bgGradient";
			lineGradientElemt.innerHTML = 
			`<stop offset="0%" stop-color="#ffe7d9"/>
			<stop offset="50%" stop-color="#fffdfb"/>
			<stop offset="100%" stop-color="#ffe7d9"/>`;

			return lineGradientElemt;
		}
	}

	#chartTitle(){
		
		// <!-- Chart Title -->
		// <text x="175" y="15" transform="rotate(0)" text-anchor="middle" fill="#333" 
		// font-family="Arial" font-size="10" font-weight="bold" letter-spacing="1">${this.#chartStruct.chart.label}</text> 
		
		const chatTitle = this.createTextElement({
			id : 'chartTitle',
			x: this.#svgDimention.svgWidth / 2, 
			y: Math.round(this.#svgDimention.svgHeight * 7/100),
			textContent : this.#chartStruct.chart.title,
			text_anchor: "middle", fill : 'rgba(74, 34, 6, 1)', font_weight: "bold",
			letter_spacing : 0, font_family : "'Inter', 'Roboto', 'sans-serif'", font_size: 10
		});

		this.#chartElements.chartTitle = chatTitle;
		this.#chartElements.chartSVG.append(chatTitle);
	}
	
	#drawChartDataLineLabel(){

		const group = this.createGroupElement();
		group.dataset.label = 'chartDatalineLabels';

		let offsetX = 0; // 👉 horizontal spacing control

		this.#chartStruct.data.datasets.forEach((dataset, index)=>{

			const color = dataset.color || this.chartDataLineColors[index];

			// 🔷 subgroup (each legend item)
			const itemGroup = this.createGroupElement();

			// 🟦 color box
			const box = this.createRectElement({
				width: 12,
				height: 6,
				fill_color: color,
				rx: 2,
			});

			box.setAttribute("x", offsetX);
			box.setAttribute("y", 0);

			// 📝 text
			const text = this.createTextElement({
				x: offsetX + 18,
				y: 6,
				font_size: 7,
				textContent: dataset.label,
				text_anchor: "start"
			});

			itemGroup.append(box, text);
			group.append(itemGroup);

			// 👉 spacing next item
			offsetX += 18 + (dataset.label.length * 4) + 15;
		});

		// 🔥 center align properly
		const totalWidth = offsetX;
		const bbox = group.getBBox();
		const startX = (this.#svgDimention.drawWidth - this.#valueMargin.xRight - bbox.width) / 2;

		group.setAttribute(
			"transform",
			`translate(${startX}, ${this.#padding.top})`
		);

		this.#chartElements.chartDataLineLabel = group;
		this.#chartElements.chartSVG.append(group);
	}

	#drawXAxisLine(){
		// <line x1="${this.#padding.left}" y1="${this.#padding.top}" 
		// 		x2="${this.#padding.left}" y2="${this.#padding.top + this.#svgDimention.drawHeight}" 
		// 		stroke="#ccc" stroke-width="2" />
		const XAxisLine =  this.createLineElement({
			id : 'yAxisLine',
			x1:this.#padding.left, y1: this.#padding.top, x2:this.#padding.left, y2: this.#padding.top + this.#svgDimention.drawHeight,
			stroke : '#ccc', stroke_width: 2});
		
		this.#chartElements.xAxisLine = XAxisLine;
		this.#chartElements.chartSVG.append(XAxisLine);
	}

	#drawXAxisTitle(){
		// <!-- xAxis Title --> 
		// <text id="xTitle" x="175" y="195" transform="rotate(0)" text-anchor="middle" fill="#333" 
		// font-family="Arial" font-size="10" font-weight="bold" letter-spacing="1">Time</text>
		
		const xTitle = this.createTextElement({
			id: 'xTitle',
			x: this.#padding.left + this.#svgDimention.drawWidth / 2,
			y: this.#svgDimention.svgHeight - 5,
			text_anchor: 'middle',
			fill: 'rgba(74, 34, 6, 1)',
			font_family : 'Arial',
			font_size : 9,
			font_weight : 'bold',
			letter_spacing : 1,
			textContent : this.#chartStruct.xAxis.title,
		});
		
		//console.log(xTitle);
		this.#chartElements.xAxisTitle = xTitle;
		this.#chartElements.chartSVG.appendChild(xTitle);
	}

	#drawXAxisLabels(){ 
		// <g id="xAxisLables"  font-family="Arial" font-size="10" fill="#666" text-anchor="end"></g>

		const xAxisLabelGroup = this.createGroupElement({
			id: 'xAxisLables',
			font_family : 'Arial',
			font_size: 6,
			fill: '#666',
			text_anchor: 'end'
		});
		const labels = this.#chartStruct.data.labels;

		//console.log(labels.length);
		
		labels.forEach( (label, i)=> {
			const xPos = this.#padding.left + (i / (labels.length - 1 || 1)) * (this.#svgDimention.drawWidth - this.#padding.right);
			// --- 1. creating Text Label---
			const textEl = this.createTextElement({
				x: xPos,
				y: this.#svgDimention.svgHeight - 17,
				text_anchor: 'start',
				font_size: 6, 
				rotate : {angle: -45, cx: xPos- this.#padding.right, cy: this.#svgDimention.svgHeight}, // 🔥 45° tilt
				textContent: label,
			}); 
			xAxisLabelGroup.appendChild(textEl);

			// --- 2. Create Dot (Circle) on X-axis🔥 ---
			const dotEl = this.createCircleElement({
				cx: xPos, // X position (same as text)
				cy: this.#padding.top + this.#svgDimention.drawHeight,	// Y position (this on X-axis on line 160 )
				radius: 2.5, // size of dot (Radius)
				fill: '#666',
			});
			
			xAxisLabelGroup.appendChild(dotEl); // add dot in same group
		});

		this.#chartElements.xAxisLables = xAxisLabelGroup;
		this.#chartElements.chartSVG.append(xAxisLabelGroup);
	}


	#drawYAxisLine(){
		// <line id="xAxisLine"
		// 			x1="${this.#padding.left}" y1="${this.#padding.top + this.#svgDimention.drawHeight}" 
		// 			x2="${this.#padding.left + this.#svgDimention.drawWidth}" y2="${this.#padding.top + this.#svgDimention.drawHeight}" 
		// 			stroke="#ccc" stroke-width="2" />
		const yAxisLine =  this.createLineElement({
			id:'xAxisLine',
			x1: this.#padding.left, y1: this.#padding.top + this.#svgDimention.drawHeight, 
			x2: this.#padding.left + this.#svgDimention.drawWidth, y2: this.#padding.top + this.#svgDimention.drawHeight,
			stroke : '#ccc', stroke_width : 2});
		
		this.#chartElements.yAxisLine = yAxisLine;
		this.#chartElements.chartSVG.append(yAxisLine);
	}
	

	#drawYAxisTitle(){
		const yTitle = this.createTextElement({
			x: - (this.#svgDimention.svgHeight / 2), y: 18,
			textContent: this.#chartStruct.yAxis.title,
			rotate: {angle: -90},
			text_anchor: 'middle', fill : '#333',
			font_family : 'Arial', font_size: 8, font_weight : 'bold', letter_spacing: 1,
			id : "yTitle",
		});

		this.#chartElements.yAxisTitle = yTitle;
		this.#chartElements.chartSVG.appendChild(yTitle);
	}


	#drawYAxisLabels(steps =5){
		const stepValue = this.#DataRange.max  / steps;

		// 1. Draw Y-Axis Values (0, 25, 50, 75, 100)
		//document.getElementById("yAxisValues");
		const yAxisGroup = this.createGroupElement({ font_family : 'Arial', font_size : 6, fill : 'rgba(74, 34, 6, 1)', text_anchor :'end', id : "YAxisLabels"});

		
		for (let val = 0; val <= this.#DataRange.max; val += stepValue) {
			const yPos = this.#svgDimention.svgHeight - this.#padding.bottom - (val - this.#DataRange.min) / (this.#DataRange.max - this.#DataRange.min) * (this.#svgDimention.drawHeight -this.#valueMargin.yTop);

			// 🟡 GRID LINE ADD करो यहाँ
			if (val !==	0 ){
				const gridLine = this.createLineElement({ x1 : this.#padding.left, x2 : this.#svgDimention.svgWidth - this.#padding.right, y1 : yPos, y2 : yPos, stroke : '#eee', stroke_width :1, });
				gridLine.classList.add('gridLineAnimation');
				yAxisGroup.appendChild(gridLine);
			}
			
			
			// 📝 TEXT LABEL
			const textEl = this.createTextElement({
				x: this.#padding.left - 5, // Line se thoda pehle
				y: yPos + 3, // Center align karne ke liye +3
				textContent: val, font_size: 6,
				text_anchor: 'end',
			});

			yAxisGroup.appendChild(textEl);

			// 2. Create 🟡 Dot Mark on y-axis ---
			const dotEls = this.createCircleElement({
				cx: this.#padding.left, 
				cy: yPos,		// Y position (defult X-axis line on 160 )
				radius : 2.5,	// dot's size (Radius)
				fill: "#666" // color of dot or "#333"
			});

			yAxisGroup.appendChild(dotEls);
		}

		this.#chartElements.yAxisLables = yAxisGroup;
		this.#chartElements.chartSVG.append(yAxisGroup);
	}
	
	#drawChartDataLine(){
		//console.log( this.#chartStruct.labels );
		const dataCircleMainGroup = this.createGroupElement({ id : 'mainCircleGroup'});
		this.#chartElements.dataCircleMasterGroup = dataCircleMainGroup;

		this.#chartStruct.data.datasets.forEach(( dataset, index)=>{
			
			const datasetGroup = this.createGroupElement({id: 'dataset' + index});
			
			
			// 2. Convert Data to X,Y Points object (Label के साथ)
			const points = dataset.data.map((value, index) => {
				const usableHeight = this.#svgDimention.drawHeight - this.#valueMargin.yTop;
				const usableWidth = this.#svgDimention.drawWidth - this.#valueMargin.xRight;
				
				const rawX = this.#padding.left + (index / (dataset.data.length - 1 || 1)) * usableWidth;
				const rawY = this.#svgDimention.svgHeight - this.#padding.bottom - (value / this.#DataRange.max) * usableHeight;
				
				return {
					x: rawX,
					y:  rawY,
					val: value,
					label: this.#chartStruct.data.labels[index] // टूलटिप के लिए टाइम सेव किया (time )
				};
			});
			
			const smoothPathString = this.#createSmoothPath({points: points});
			const color = this.#chartStruct.data.datasets[index].color || this.chartDataLineColors[index % this.chartDataLineColors.length];
			
			const linePath = this.#createChartDataLine(smoothPathString, index, color);
			const chartAreaFill= this.#createChartAreaFill(smoothPathString, points, index, color );
			
			/* Add Animation */ 
			if (!this.#chartElements.chartDataSetsElemnts[index])
				this.#chartElements.chartDataSetsElemnts[index]={};


			const datapointCircleGroup = this.#createChartDataCircle( points, index);
			this.#chartElements.chartDataSetsElemnts[index].dataPointGroup = datapointCircleGroup;
			
			dataCircleMainGroup.append(datapointCircleGroup); 

			datasetGroup.append( chartAreaFill, linePath);
			this.#chartElements.chartSVG.appendChild(datasetGroup);
		});
		this.#chartElements.chartSVG.appendChild(dataCircleMainGroup);
	}

	#createSmoothPath({points = [], tension = 0.15}={}) {
		// 3. Smooth Curve Generator Function 
		let d = `M ${points[0].x},${points[0].y} `;
		for (let i = 0; i < points.length - 1; i++) {
			const p0 = points[i === 0 ? 0 : i - 1];
			const p1 = points[i];
			const p2 = points[i + 1];
			const p3 = points[i + 2 === points.length ? i + 1 : i + 2]; 

			const clampY = (y) => {
				const minY = this.#padding.top;
				const maxY = this.#svgDimention.svgHeight - this.#padding.bottom;
				return Math.max(minY, Math.min(maxY, y));
			};
			const cp1x = p1.x + (p2.x - p0.x) * tension;
			const cp1y = clampY(p1.y + (p2.y - p0.y) * tension);
			const cp2x = p2.x - (p3.x - p1.x) * tension;
			const cp2y = clampY(p2.y - (p3.y - p1.y) * tension);
			d += `C ${cp1x},${cp1y} ${cp2x},${cp2y} ${p2.x},${p2.y} `;
		}
		return d;
	}

	#createChartDataLine(smoothPathString, index, color ){
		// Line set karna
		const linePath = this.createPathElement({id: 'lineChart' + index, fill: 'none', stroke: color, stroke_width: 2, d :smoothPathString});
	
		if (!this.#chartElements.chartDataSetsElemnts[index]){
			this.#chartElements.chartDataSetsElemnts[index] = {};
		}
			
		this.#chartElements.chartDataSetsElemnts[index].chartDataLine = linePath;
		
		return linePath;
	}

	#createChartAreaFill(smoothPathString, points, index, color ){
		// Area set karna
		//const areaPathString = `${smoothPathString} L ${this.#padding.left + this.#svgDimention.drawWidth},${this.#svgDimention.svgHeight - this.#padding.bottom} L ${this.#padding.left},${this.#svgDimention.svgHeight - this.#padding.bottom} Z`;
		
		const lastPoint = points[points.length - 1];
		const firstPoint = points[0];
		const bottomY = this.#svgDimention.svgHeight - this.#padding.bottom;

		const areaPathString = `
		${smoothPathString}
		L ${lastPoint.x}, ${bottomY}
		L ${firstPoint.x}, ${bottomY}
		Z`;

		const chartAreaFill = this.createPathElement({ id: 'chartFillArea' + index, fill: color, stroke: 'none', d : areaPathString});
		//chartAreaFill par animation
		//Step 1: clipPath बनाओ
		const clipId = "clip" + index;

		const clipPath = document.createElementNS(CoreSVGChart.svgNS, "clipPath");
		clipPath.setAttribute("id", clipId);

		const rect = document.createElementNS(CoreSVGChart.svgNS, "rect");
		rect.setAttribute("x", this.#padding.left);
		rect.setAttribute("y", this.#padding.top);
		rect.setAttribute("width", 0);
		rect.setAttribute("height", this.#svgDimention.drawHeight);

		this.#chartElements.chartDataSetsElemnts[index].clipRect = rect;
		clipPath.appendChild(rect);
		this.#chartElements.defs.appendChild(clipPath);
		
		//Step 2: chartAreaFill पर apply करो
		chartAreaFill.setAttribute("clip-path", `url(#${clipId})`);

		//Step 3: animate करो (bottom → top)
		
		const areaGradientID = 'areaGradient' + index;
		this.#chartElements.defs.append(this.#gradientChartFillEffect({id: areaGradientID , color: color}));

		chartAreaFill.setAttribute("fill", `url(#${areaGradientID})`); 
		
		this.#chartElements.chartAreaFill = chartAreaFill;
		return  chartAreaFill;
	}

	#createChartDataCircle(points, index){
		// 🔹 circles create
		const chartDataPointGroup =  this.createGroupElement({id: 'chartDataPointGroup' + index});
		const color = this.#chartStruct.data.datasets[index].color || this.chartDataLineColors[index % this.chartDataLineColors.length];
		points.forEach((point, i) => {

			const circle = this.createCircleElement({
				cx: point.x,
				cy: point.y,
				radius: 1.5, // 👈 पहले invisible
				fill: color,
				stroke_color: '#fff',
				stroke_width: '1'
			});

			// css Animtion on circle  was here 

			// 🔥 data store (important)
			circle.dataset.x = point.x;
			circle.dataset.y = point.y;
			circle.dataset.val = point.val;
			circle.dataset.label = point.label;
			circle.dataset.datasetIndex = index;

			circle.classList.add('dataPointCircle');

			chartDataPointGroup.append(circle);
		});
		return chartDataPointGroup;
	}

	#addEventOnDataPoint(){
		const tooltip = new SmartTooltip(this.#chartElements.chartSVG, {
			arrowSize: 6,
			offset: 10,
			fontSize : 6,
			});

			
		this.#addCSS('circleHoverAnimaiton', 
		`.dataPointCircle {
			transition: r 150ms ease-out, fill 0.3s ease;
			transform-box: fill-box; 
    		transform-origin: center;
		}

		.dataPointCircle.active {}`);

		const mainCircelGroup = this.#chartElements.dataCircleMasterGroup;

		//🔥 EVENT → only on group
		mainCircelGroup.addEventListener("mouseover", (e) => {

			const circleP = e.target.closest('circle'); // only circle trigger
			if (!circleP) return;
			
			// tooltip show
			const datasetIndex = circleP.dataset.datasetIndex;

			circleP.classList.add('active');
			circleP.setAttribute("r", "3");
			// circleP.setAttribute('transition', `r 150ms ease-out, fill 0.3s ease`);
			// circleP.setAttribute('transform-box', `fill-box`); 
    		// circleP.setAttribute(`transform-origin`, `center`);

			
			const x = +circleP.dataset.x;
			const y = +circleP.dataset.y;
			const tooltipsText = `${circleP.dataset.val}% \u00A0\u00A0 at \u00A0\u00A0 ${circleP.dataset.label.replace(/\s/g, "")}`;
			tooltip.show(x, y, tooltipsText);
			
		}, true);

		mainCircelGroup.addEventListener("mouseout", (e) => {
			const circleP = e.target.closest('circle'); // only circle trigger
			if (!circleP) return;
			
			if (circleP.contains(e.relatedTarget)) return; // 🔥 avoid flicker
			
			const datasetIndex = circleP.dataset.datasetIndex;

			/* Animaiton on circle */
			circleP.setAttribute("r", "1.5"); 
			circleP.classList.remove('active');
			
			
			tooltip.hide();

		}, true);
	}

	// ====== Animation logic Area strat ====
	#addCSS(id, cssCode){
		let styleSheet = document.getElementById(id);
		
		if (styleSheet) return;
		
		let isNew = false;
		if(!styleSheet){
			styleSheet = document.createElement('style');
			styleSheet.id = id ;
			isNew = true;
		}
		
		styleSheet.textContent = cssCode;
		if (isNew){
			document.head.append(styleSheet);
		}

	}

		// const cssCode =`

		// 	}

	#addDataLineFillAnimation(){
		const fullWidth = this.#svgDimention.drawWidth;

		this.#chartElements.chartDataSetsElemnts.forEach((elemts) => {
			const rect  = elemts.clipRect;
			// console.log(rect);
			rect.animate([
				{ width: "0px" },
				{ width: fullWidth + 'px'}
			], {
				duration: this.#cssAnimationDuration,
				easing: "ease-out",
				fill: "forwards"
			});
		});
	}

	#addToolTipsAnimation(tooltipText, tooltipBg){}

	
	#addDataPointCircleAnimation() {

		const cssCode = `
		.circleAnimation {
			transform-origin: center;
			opacity: 0;
		}

		.circleAnimation.animate {
			animation: popIn 0.3s ease forwards;
		}

		@keyframes popIn {
			0% { opacity: 0; transform: scale(0); }
			
			100% { opacity: 1; transform: scale(1); }
		}
		`;

		this.#addCSS("circleAnim", cssCode);

		const lineDuration = this.#cssAnimationDuration;

		this.#chartElements.chartDataSetsElemnts.forEach((datasetElemts) => {

			const circles = datasetElemts.dataPointGroup.querySelectorAll("circle");
			const total = circles.length;

			circles.forEach((circle, index) => {

				// 👉 base class
				circle.classList.add("circleAnimation");

				// 🔥 auto delay (NO ARGUMENT NEEDED)
				const delay = (index / (total - 1)) * (lineDuration * 0.95);

				circle.style.animationDelay = delay + "ms";

				// 👇 trigger properly
				requestAnimationFrame(() => {
					circle.classList.add("animate");
				});
			});
		});
	}

	// ====== Animation logic Area end ====

	#gradientChartFillEffect({id='', x1=0, y1=0, x2=0, y2=1,color= '#af556a'}){
		const linearGradientElemnt = document.createElementNS(CoreSVGChart.svgNS, 'linearGradient');
		linearGradientElemnt.setAttribute('id', id);
		linearGradientElemnt.setAttribute('x1', x1);
		linearGradientElemnt.setAttribute('y1', y1);
		linearGradientElemnt.setAttribute('x2', x2);
		linearGradientElemnt.setAttribute('y2', y2);
		linearGradientElemnt.innerHTML = `<stop offset="0%" stop-color="${color}" stop-opacity="0.6"/>
											<stop offset="100%" stop-color="${color}" stop-opacity=".1"/>`;
		
		return linearGradientElemnt;
	}

class SmartTooltip {
  constructor(svg, options = {}) {
    this.svg = svg;

    this.padding = options.padding || { top: 10, left: 10, right: 10, bottom: 10 };
    this.arrowSize = options.arrowSize || 6;
    this.offset = options.offset || 8;
	this.fontSize = options.fontSize || 10;
    this._createTooltip();
  }

  _createTooltip() {
	const bgColor = "rgba(34, 34, 34, 0.73)";
    // Group
    this.group = document.createElementNS("http://www.w3.org/2000/svg", "g");
    this.group.setAttribute("opacity", "0");
    this.group.style.pointerEvents = "none";

    // Background
    this.bg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    this.bg.setAttribute("rx", "5");
    this.bg.setAttribute("fill", bgColor);

    // Text
    this.text = document.createElementNS("http://www.w3.org/2000/svg", "text");
    this.text.setAttribute("fill", "rgb(255, 243, 225)");
    this.text.setAttribute("font-size", this.fontSize);
    this.text.setAttribute("text-anchor", "middle");
    this.text.setAttribute("dominant-baseline", "middle");

    // Arrow
    this.arrow = document.createElementNS("http://www.w3.org/2000/svg", "path");
    this.arrow.setAttribute("fill", bgColor);

    this.group.appendChild(this.bg);
    this.group.appendChild(this.arrow);
    this.group.appendChild(this.text);

    this.svg.appendChild(this.group);
  }

  show(x, y, content) {
    this.text.textContent = content;

    // reset transform for bbox
    this.group.setAttribute("transform", "translate(0,0)");

    const bbox = this.text.getBBox();
    const padding = 6;

    const width = bbox.width + padding * 2;
    const height = bbox.height + padding * 2;

    // update bg
    this.bg.setAttribute("width", width);
    this.bg.setAttribute("height", height);
    this.bg.setAttribute("x", 0);
    this.bg.setAttribute("y", 0);

    // center text
    this.text.setAttribute("x", width / 2);
    this.text.setAttribute("y", height / 2);

    // 👉 smart position detect
    let position = "top";

    if (y - height < this.padding.top +30) {
      position = "bottom";
    } else if (x + width > this.svg.viewBox.baseVal.width) {
      position = "left";
    } else if (x - width < this.padding.left) {
      position = "right";
    }

    let tipX, tipY;

    const s = this.arrowSize;
    const o = this.offset;

    // 👉 positioning (NO correction needed)
    switch (position) {
      case "top":
        tipX = x - width / 2;
        tipY = y - height - o;

        this.arrow.setAttribute("d", `M0 0 L${s*2} 0 L${s} ${s} Z`);
        this.arrow.setAttribute("transform", `translate(${width/2 - s}, ${height})`);
        break;

      case "bottom":
        tipX = x - width / 2;
        tipY = y + o;

        this.arrow.setAttribute("d", `M${s} 0 L${s*2} ${s} L0 ${s} Z`);
        this.arrow.setAttribute("transform", `translate(${width/2 - s}, -${s})`);
        break;

      case "left":
        tipX = x - width - o;
        tipY = y - height / 2;

        this.arrow.setAttribute("d", `M0 0 L${s} ${s} L0 ${s*2} Z`);
        this.arrow.setAttribute("transform", `translate(${width}, ${height/2 - s})`);
        break;

      case "right":
        tipX = x + o;
        tipY = y - height / 2;

        this.arrow.setAttribute("d", `M${s} 0 L${s} ${s*2} L0 ${s} Z`);
        this.arrow.setAttribute("transform", `translate(-${s}, ${height/2 - s})`);
        break;
    }

    // 👉 clamp (never go outside)
    const svgW = this.svg.viewBox.baseVal.width;
    const svgH = this.svg.viewBox.baseVal.height;

    tipX = Math.max(this.padding.left, Math.min(tipX, svgW - width));
    tipY = Math.max(this.padding.top, Math.min(tipY, svgH - height));

    this.group.setAttribute("transform", `translate(${tipX}, ${tipY})`);

    // 👉 animation
    this.group.style.transition = "opacity 0.3s ease, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
    this.group.setAttribute('transform-box', 'fill-box');
    this.group.setAttribute('transform-origin', 'center');

	this.group.setAttribute("opacity", "1");
  }

  hide() {
    this.group.setAttribute("opacity", "0");
  }
}
