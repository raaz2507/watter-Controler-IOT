<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Advanced SVG Chart</title>
	<style>
		#chartContainer{
			width: 100%;
			max-width: 700px;
		}
		#chartContainer svg{
			width: 100%;
			height: 100%;
		}
		/* Area chart fade-in */
		#lineChart0 {
			opacity: 0;
			animation: fadeIn 2s ease-in-out forwards;
			animation-delay: 0.5s;
		}
		
		@keyframes fadeIn {
			to { opacity: 0.5; }
		}

		/* Dots ke liye base aur hover animation */
		circle {
			opacity: 0;
			transform-origin: center;
			animation: popIn 0.3s ease-out forwards;
			transition: all 0.2s ease; /* Hover par smooth transition */
			cursor: pointer;
		}

		/* Hover karne par dot bada hoga */
		circle:hover {
			r: 4px;
			fill: #87DBEB;
			stroke: #f0fbff;
			stroke-width: 2px;

		}

		@keyframes popIn {
			0% { opacity: 0; transform: scale(0); }
			100% { opacity: 1; transform: scale(1); }
		}

		/* Tooltip style */
		.tooltip-text {
			font-family: Arial, sans-serif;
			font-size: 12px;
			fill: white;
			font-weight: bold;
			pointer-events: none; /* Mouse block na kare */
			
		}
		.tooltip-bg {
			fill: rgba(0, 0, 0, 0.8);
			rx: 4; /* Rounded corners */
			pointer-events: none;
		}
	</style>
</head>
<body>

	<div id="chartContainer">
		<svg id="chart" width="100%" height="300" viewBox="0 0 350 200">

			<defs>
				<linearGradient id="areaGradient" x1="0" y1="0" x2="0" y2="1">
					<stop offset="0%" stop-color="#0BB5FF" stop-opacity="0.9"/>
					<stop offset="100%" stop-color="#0BB5FF" stop-opacity=".3"/>
				</linearGradient>
			</defs>
		
			<!-- Chart Title -->
			<text x="175" y="15" transform="rotate(0)" text-anchor="middle" fill="#333" font-family="Arial" font-size="10" font-weight="bold" letter-spacing="1">Todays Chart</text> 

			<!-- vertical line (y-axis)-->
			<text x="-100" y="18" transform="rotate(-90)" text-anchor="middle" fill="#333" font-family="Arial" font-size="10" font-weight="bold" letter-spacing="1">Water Lavel</text>
			<line x1="40" y1="20" x2="40" y2="160" stroke="#ccc" stroke-width="2" />
			<g id="yAxisValues" font-family="Arial" font-size="10" fill="#666" text-anchor="end"></g>

			<!-- horizontal Line (x-axis) -->
			<text x="175" y="195" transform="rotate(0)" text-anchor="middle" fill="#333" font-family="Arial" font-size="10" font-weight="bold" letter-spacing="1">Time</text>
			<line x1="40" y1="160" x2="340" y2="160" stroke="#ccc" stroke-width="2" /> 
			<g id="xAxisValues"  font-family="Arial" font-size="10" fill="#666" text-anchor="end"></g>

			<!-- chart Data Lines -->
			<path id="lineChart" fill="none" stroke="#0BB5FF" stroke-width="2" />
			<path id="areaChart" fill="#98F5FF" stroke="none" />
			
			<!--info box on  chart Data Lines -->
			<g id="tooltipGroup" style="display: none;">
				<rect id="tooltipBg" class="tooltip-bg" width="30" height="20" x="0" y="0"></rect>
				<text id="tooltipText" class="tooltip-text" x="15" y="14" text-anchor="middle">0</text>
			</g>
		</svg>
	</div>

<script>
const data = [0, 20, 30, 25, 40, 0, 50, 100, 65, 80, 90, 85,
			  70, 60, 55, 50, 45, 40, 35, 30, 25, 20, 15, 10];
const now = new Date();
// Padding Settings
const padding = { top: 20, right: 10, bottom: 40, left: 40 };
const svgWidth = 350;
const svgHeight = 200;
const drawWidth = svgWidth - padding.left - padding.right-20; // 300
const drawHeight = svgHeight - padding.top - padding.bottom-20; // 150

// Y-axis max fix to 100 as requested
const maxData = 100; 

// 1. Draw Y-Axis Values (0, 25, 50, 75, 100)
const yAxisGroup = document.getElementById("yAxisValues");
for (let val = 0; val <= 100; val += 10) {
	const yPos = svgHeight - padding.bottom - (val / maxData) * drawHeight;

	// 🟡 GRID LINE ADD करो यहाँ
	const gridLine = document.createElementNS("http://www.w3.org/2000/svg", "line");

	gridLine.setAttribute("x1", padding.left);
	gridLine.setAttribute("x2", svgWidth - padding.right);
	gridLine.setAttribute("y1", yPos);
	gridLine.setAttribute("y2", yPos);
	gridLine.setAttribute("stroke", "#eee");
	gridLine.setAttribute("stroke-width", "1");

	yAxisGroup.appendChild(gridLine);


	// 📝 TEXT LABEL
	const textEl = document.createElementNS("http://www.w3.org/2000/svg", "text");
	textEl.setAttribute("x", padding.left - 5); // Line se thoda pehle
	textEl.setAttribute("y", yPos + 3); // Center align karne ke liye +3
	textEl.textContent = val;
	yAxisGroup.appendChild(textEl);

	// --- 2. y-axis पर Dot (Circle) Create करना 🔥 ---
	const dotEl = document.createElementNS("http://www.w3.org/2000/svg", "circle");
	
	dotEl.setAttribute("cy", yPos); // X पोजीशन (वही जो टेक्स्ट की है)
	dotEl.setAttribute("cx", 40);  // Y पोजीशन (आपकी X-axis लाइन 160 पर है)
	dotEl.setAttribute("r", 2.5);   // डॉट का साइज़ (Radius)
	dotEl.setAttribute("fill", "#666"); // डॉट का कलर (आप इसे "blue" या "#333" भी कर सकते हैं)

	// डॉट को भी उसी ग्रुप में जोड़ दें
	yAxisGroup.appendChild(dotEl);
}

// 1.1 . Draw X-Axis Values (labes) (12hr in am pm mode)
const xAxisGroup = document.getElementById("xAxisValues");
xAxisGroup.innerHTML = "";

for (let i = 0; i < 24; i++) {

	const xPos = padding.left + (i / 23) * drawWidth;

	// 🕒 Current time based shift
	
	let hour = (now.getHours() - (24 - i) + 24) % 24;
	let label = "";

	if (hour === 0) label = "12 am";
	else if (hour < 12) label = hour.toString().padStart(2, '0') + " am";
	else if (hour === 12) label = "12 pm";
	else label = (hour - 12).toString().padStart(2, '0') + " pm";

	// --- 1. Text Label Create करना ---
	const textEl = document.createElementNS("http://www.w3.org/2000/svg", "text");

	textEl.setAttribute("x", xPos);
	textEl.setAttribute("y", svgHeight - 17); // Text की Y पोजीशन 

	// 🔥 45° tilt
	textEl.setAttribute("transform", `rotate(-45, ${xPos}, ${svgHeight - 5})`);

	textEl.setAttribute("text-anchor", "start");
	textEl.setAttribute("font-size", "9");
	textEl.textContent = label;

	xAxisGroup.appendChild(textEl);

	// --- 2. X-axis पर Dot (Circle) Create करना 🔥 ---
	const dotEl = document.createElementNS("http://www.w3.org/2000/svg", "circle");
	
	dotEl.setAttribute("cx", xPos); // X पोजीशन (वही जो टेक्स्ट की है)
	dotEl.setAttribute("cy", 160);  // Y पोजीशन (आपकी X-axis लाइन 160 पर है)
	dotEl.setAttribute("r", 2.5);   // डॉट का साइज़ (Radius)
	dotEl.setAttribute("fill", "#666"); // डॉट का कलर (आप इसे "blue" या "#333" भी कर सकते हैं)

	// डॉट को भी उसी ग्रुप में जोड़ दें
	xAxisGroup.appendChild(dotEl);
}

// 2. Convert Data to X,Y Points object (Label के साथ)
const points = data.map((value, index) => {
    // वही लॉजिक जो आपने X-axis लेबल्स के लिए इस्तेमाल किया था
    let hour = (now.getHours() - (24 - index) + 24) % 24;
    let timeLabel = "";
    if (hour === 0) timeLabel = "12 am";
    else if (hour < 12) timeLabel = hour.toString().padStart(2, '0') + " am";
    else if (hour === 12) timeLabel = "12 pm";
    else timeLabel = (hour - 12).toString().padStart(2, '0') + " pm";

    return {
        x: padding.left + (index / (data.length - 1)) * drawWidth,
        y: svgHeight - padding.bottom - (value / maxData) * drawHeight,
        val: value,
        time: timeLabel // टूलटिप के लिए टाइम सेव किया
    };
});

// 3. Smooth Curve Generator Function
function createSmoothPath(points) {
	let d = `M ${points[0].x},${points[0].y} `;
	for (let i = 0; i < points.length - 1; i++) {
		const p0 = points[i === 0 ? 0 : i - 1];
		const p1 = points[i];
		const p2 = points[i + 1];
		const p3 = points[i + 2 === points.length ? i + 1 : i + 2];
		const tension = 0.2; 
		const cp1x = p1.x + (p2.x - p0.x) * tension;
		const cp1y = p1.y + (p2.y - p0.y) * tension;
		const cp2x = p2.x - (p3.x - p1.x) * tension;
		const cp2y = p2.y - (p3.y - p1.y) * tension;
		d += `C ${cp1x},${cp1y} ${cp2x},${cp2y} ${p2.x},${p2.y} `;
	}
	return d;
}

const smoothPathString = createSmoothPath(points);

// Line set karna
const linePath = document.getElementById("lineChart");
linePath.setAttribute("d", smoothPathString);

// Area set karna
const areaPathString = `${smoothPathString} L ${padding.left + drawWidth},${svgHeight - padding.bottom} L ${padding.left},${svgHeight - padding.bottom} Z`;
document.getElementById("areaChart").setAttribute("d", areaPathString);

// Line Drawing Animation setup
const pathLength = linePath.getTotalLength();
linePath.style.strokeDasharray = pathLength;
linePath.style.strokeDashoffset = pathLength;
linePath.getBoundingClientRect(); 
// linePath.style.transition = 'stroke-dashoffset 2s ease-in-out';
linePath.style.transition = 'stroke-dashoffset 2s cubic-bezier(0.4, 0, 0.2, 1)';
linePath.style.strokeDashoffset = '0';

// Tooltip elements
const tooltipGroup = document.getElementById("tooltipGroup");
const tooltipBg = document.getElementById("tooltipBg");
const tooltipText = document.getElementById("tooltipText");
const chartSVG = document.getElementById("chart");


// 4. data graph line par Circles draw karna aur Tooltip Event lagana
points.forEach((point, index) => {
    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    // ... (बाकी एट्रिब्यूट्स वही रहेंगे)
    circle.setAttribute("cx", point.x);
    circle.setAttribute("cy", point.y);
    circle.setAttribute("r", 1.5); 
    circle.setAttribute("fill", "#41ffff8e");
    circle.setAttribute("stroke", "rgb(255, 255, 255)");
    circle.setAttribute("stroke-width", "1");
	circle.style.animationDelay = `${(index / points.length) * 2}s`;

    // Tooltip Hover Logic
    circle.addEventListener("mouseenter", () => {
        tooltipGroup.style.display = "block";
        
        // टूलटिप में वैल्यू और टाइम दोनों दिखाएं
        tooltipText.innerHTML = `<tspan x="${point.x}" dy="1.2em" font-weight="bold">${point.val}%</tspan>
                                 <tspan x="${point.x}" dy="1.2em" font-size="8">${point.time}</tspan>`;
        
        const tipX = point.x - 25; // बॉक्स थोडा चौड़ा किया है
        const tipY = point.y - 45; // बॉक्स थोडा ऊपर किया है

		if (tipX < 0) tipX = 0;
		if (tipX > svgWidth - 50) tipX = svgWidth - 50;
		if (tipY < 0) tipY = 10;
        
        // टूलटिप बॉक्स (Background) की सेटिंग्स 🔥
        tooltipBg.setAttribute("x", tipX+4);
        tooltipBg.setAttribute("y", tipY+7);
        tooltipBg.setAttribute("width", "40");
        tooltipBg.setAttribute("height", "25");
        tooltipBg.setAttribute("rx", "1");          // Border Radius
        tooltipBg.setAttribute("fill-opacity", "0.8"); // Transparency (0.1 से 1 तक)
        tooltipBg.setAttribute("fill", "#333");      // डार्क बैकग्राउंड ज्यादा अच्छा लगता है
        
        tooltipText.setAttribute("x", point.x);
        tooltipText.setAttribute("y", tipY + 5);
        tooltipText.setAttribute("fill", "white");   // टेक्स्ट वाइट

        chartSVG.appendChild(tooltipGroup);
    });

    circle.addEventListener("mouseleave", () => {
        tooltipGroup.style.display = "none";
    });
    chartSVG.appendChild(circle);
});
// //Y-axis के साथ horizontal lines:
// const gridLine = document.createElementNS("http://www.w3.org/2000/svg", "line");

// gridLine.setAttribute("x1", padding.left);
// gridLine.setAttribute("x2", svgWidth - padding.right);
// gridLine.setAttribute("y1", yPos);
// gridLine.setAttribute("y2", yPos);
// gridLine.setAttribute("stroke", "#eee");

// yAxisGroup.appendChild(gridLine);

// Append tooltip group properly at the end so it's always on top
chartSVG.appendChild(tooltipGroup);
document.getElementById("areaChart")
.setAttribute("fill", "url(#areaGradient)");
</script>





</body>
</html>
